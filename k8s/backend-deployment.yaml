apiVersion: apps/v1
kind: Deployment
metadata:
  name: scoreops-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scoreops-backend
  template:
    metadata:
      labels:
        app: scoreops-backend
    spec:
      containers:
        - name: backend
          image: scoreops-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: scoreops-env
---
apiVersion: v1
kind: Service
metadata:
  name: scoreops-backend-service
spec:
  selector:
    app: scoreops-backend
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
