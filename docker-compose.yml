services:
  backend:
    build: ./backend
    container_name: scoreops-backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    restart: unless-stopped


  frontend:
    build: ./frontend
    container_name: scoreops-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: scoreops-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: scoreops-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped
    node-exporter:
      image: prom/node-exporter:latest
      container_name: scoreops-node-exporter
      ports:
        - "9100:9100"
      restart: unless-stopped
